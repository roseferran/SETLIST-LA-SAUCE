<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlists — La Sauce</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#FAF7F2;--ink:#1A1714;--muted:#6B6560;--faint:#B8B3AE;--border:#E8E2DA;
  --red:#E24B4A;--green:#1D9E75;--blue:#185FA5;
}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:9999}
#loading h2{font-family:'DM Serif Display',serif;font-size:2rem}
#loading p{color:var(--muted);font-size:13px}
.spin{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* OVERLAY */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-start;justify-content:center;z-index:900;padding:2rem 1rem;overflow-y:auto}
.box{background:var(--cream);border-radius:14px;padding:2rem;width:100%;max-width:440px;border:1.5px solid var(--ink);margin:auto}
.box.wide{max-width:560px}
.box h2{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.2rem}
.box .sub{font-size:13px;color:var(--muted);margin-bottom:1.25rem}

/* FORM ELEMENTS */
.lbl{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px}
.inp{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:var(--ink);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ink)}
.inp::placeholder{color:var(--faint)}
.sel{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:#fff;color:var(--ink);outline:none;-webkit-appearance:none;cursor:pointer;transition:border-color .15s}
.sel:focus{border-color:var(--ink)}
.ta{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;line-height:1.7;background:#fff;color:var(--ink);outline:none;resize:vertical;min-height:68px;transition:border-color .15s}
.ta:focus{border-color:var(--ink)}
.ta::placeholder{color:var(--faint)}
.fr{margin-bottom:1rem}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fa{display:flex;gap:10px;margin-top:1.25rem}
.btn{padding:10px 18px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;border:1.5px solid var(--border);background:#fff;color:var(--muted)}
.btn:hover{border-color:var(--ink);color:var(--ink)}
.btn.pri{flex:1;background:var(--ink);color:var(--cream);border-color:var(--ink)}
.btn.pri:hover{opacity:.82}
.btn.sm{padding:5px 11px;font-size:12px;border-radius:99px}
.btn.danger:hover{border-color:var(--red);color:var(--red);background:#FCEBEB}
.err{font-size:12px;color:#A32D2D;margin-top:-.5rem;display:none}

/* COLOR SWATCHES */
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.sw{width:32px;height:32px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .15s,border-color .15s;flex-shrink:0}
.sw.on{border-color:var(--ink);transform:scale(1.15)}

/* MEMBER BUTTONS */
.mbtn{display:inline-flex;align-items:center;gap:7px;padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--ink);transition:all .15s}
.mbtn:hover{border-color:var(--ink)}
.mav{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.guest-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.guest-row .mbtn{flex:1}
.del-red{padding:6px 12px;border-radius:8px;border:1.5px solid #F7C1C1;background:#FCEBEB;color:#A32D2D;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;transition:all .15s}
.del-red:hover{background:var(--red);border-color:#A32D2D;color:#fff}
.slbl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:8px;margin-top:12px;display:block}
.slbl:first-child{margin-top:0}
hr.div{border:none;border-top:1px solid var(--border);margin:1rem 0}
.mgrid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}

/* ID BAR */
.idbar{max-width:960px;margin:.75rem auto 0;padding:0 2rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.idbadge{display:inline-flex;align-items:center;gap:7px;padding:4px 12px 4px 4px;border-radius:99px;background:var(--ink);color:var(--cream);font-size:12px;font-weight:500}
.idbadge .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.chg{font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline}
.sync{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0;transition:background .3s}
.sync.ok{background:var(--green)}.sync.err{background:var(--red)}
.add-btn{margin-left:auto;padding:5px 14px;border-radius:99px;border:1.5px solid var(--ink);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink);transition:all .15s}
.add-btn:hover{background:var(--ink);color:var(--cream)}

/* HEADER */
header{padding:3rem 2rem 2rem;max-width:960px;margin:0 auto;border-bottom:1.5px solid var(--ink);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
header h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,3.5rem);line-height:1;letter-spacing:-.02em}
header p{font-size:13px;color:var(--muted);margin-top:.4rem}
.stats{display:flex;gap:1.5rem;flex-wrap:wrap}
.stat{text-align:right}
.stat-n{font-family:'DM Serif Display',serif;font-size:1.8rem;line-height:1}
.stat-l{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.07em}

/* TABS */
.tabs{max-width:960px;margin:1.5rem auto 0;padding:0 2rem;display:flex;gap:8px;flex-wrap:wrap}
.tab{position:relative;padding:6px 16px;border-radius:99px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.tab:hover{border-color:var(--faint);color:var(--ink)}
.tab.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.badge{position:absolute;top:-6px;right:-6px;background:var(--red);color:#fff;font-size:9px;font-weight:700;border-radius:99px;padding:1px 5px;min-width:16px;text-align:center;line-height:1.4}

/* FILTERS */
.filters{max-width:960px;margin:.75rem auto 0;padding:0 2rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.sep{width:1px;height:18px;background:var(--border);margin:0 2px}
.fb{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.fb:hover{border-color:var(--faint);color:var(--ink)}
.fb.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.fb.excl-btn{color:#A32D2D;border-color:#F7C1C1;background:#FCEBEB}
.fb.excl-btn.on{background:var(--red);color:#fff;border-color:var(--red)}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:2rem}
.empty{padding:3rem 0;text-align:center;color:var(--muted)}

/* NEW CARDS */
.ncard{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px;border-left:3px solid var(--green)}
.ncard-head{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.ncard-title{font-weight:500;font-size:14px}
.ncard-artist{font-size:12px;color:var(--muted)}
.ncard-meta{display:flex;gap:8px;align-items:center;margin-top:5px;flex-wrap:wrap}
.ncard-by{font-size:11px;color:var(--faint);margin-top:4px}
.ncard-actions{display:flex;gap:6px;margin-top:8px}

/* SETLIST */
.sblock{margin-bottom:3rem}
.shead{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--ink);flex-wrap:wrap}
.sname{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:-.01em}
.smeta{font-size:12px;color:var(--muted)}
.stotal{margin-left:auto;font-size:12px;color:var(--muted)}
.sgrp{margin-bottom:1.2rem}
.sgrp-lbl{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sgrp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sgrp-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted)}
.sgrp-dur{font-size:11px;color:var(--faint);margin-left:auto}
.tracks{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.track{border-bottom:1px solid var(--border)}
.track:last-child{border-bottom:none}
.trow{display:grid;grid-template-columns:22px 1fr auto auto auto;gap:0 10px;align-items:center;padding:9px 14px;transition:background .1s}
.trow:hover{background:var(--cream)}
.track.is-excl .trow{background:#FCEBEB !important;opacity:.5}
.track.is-excl .tt{text-decoration:line-through;color:var(--muted)}
.track.is-med .trow{background:#F7F4EF}
.track.is-med .trow:hover{background:#F0EDE7}
.track.is-new{border-left:3px solid var(--green)}
.tnum{font-size:11px;color:var(--faint);text-align:right}
.tinfo{min-width:0}
.tt{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ta2{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tnote{font-size:11px;color:var(--faint);font-style:italic;margin-top:1px}
.tdur{font-size:12px;color:var(--muted);white-space:nowrap}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap}
.mtag{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;background:var(--ink);color:var(--cream);padding:1px 6px;border-radius:3px;margin-right:4px;vertical-align:middle}
.ntag{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;padding:1px 6px;border-radius:3px;margin-right:4px;vertical-align:middle}

/* VOTE ROW */
.vrow{display:flex;align-items:center;gap:4px}
.vbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0;color:var(--faint)}
.vbtn:hover{border-color:var(--red);background:#FCEBEB;color:var(--red)}
.vbtn.voted{background:var(--red);border-color:#A32D2D;color:#fff}
.pbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0}
.pbtn:hover,.pbtn.has-data{border-color:var(--blue);background:#E6F1FB}
.pips{display:flex;gap:2px}
.pip{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;border:1.5px solid #ddd;background:#F1EFE8;color:#aaa;flex-shrink:0;transition:all .2s}
.pip.on{border-color:transparent;color:#fff}
.delbtn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--faint);padding:0;flex-shrink:0;margin-left:2px;transition:all .15s}
.delbtn:hover{border-color:var(--red);color:var(--red);background:#FCEBEB}

/* PARTITION */
.part-link{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:#fff;font-size:13px;font-weight:500;color:var(--ink);text-decoration:none;margin-bottom:1.25rem;transition:all .15s}
.part-link:hover{border-color:var(--ink);background:var(--ink);color:var(--cream)}
.pblock{margin-bottom:1rem}
.pblock label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:5px}
.save-row{display:flex;align-items:center;gap:10px;margin-top:1.25rem;flex-wrap:wrap}
.sav-ok{font-size:12px;color:var(--green)}
.sav-err{font-size:12px;color:var(--red)}
.upd{font-size:11px;color:var(--faint)}

/* FOOTER */
footer{max-width:960px;margin:0 auto;padding:1.5rem 2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
footer p{font-size:11px;color:var(--faint)}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}

@media(max-width:640px){
  header,.tabs,.filters,main,footer,.idbar{padding-left:1.25rem;padding-right:1.25rem}
  .trow{grid-template-columns:18px 1fr auto auto}
  .trow .pill{display:none}
  .pips{display:none}
  .stat-n{font-size:1.4rem}
  .fg{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loading"><div class="spin"></div><h2>Setlists</h2><p>Connexion…</p></div>

<!-- MODAL IDENTITÉ -->
<div class="ov" id="mo-ov" style="display:none">
  <div class="box" id="mo-box">
    <h2>Qui es-tu ?</h2>
    <p class="sub">Choisis ton profil ou crée-en un nouveau</p>

    <!-- Admins -->
    <span class="slbl">Membres principaux</span>
    <div class="mgrid" id="mo-admins"></div>

    <!-- Invités -->
    <div id="mo-guests-wrap" style="display:none">
      <span class="slbl">Invités</span>
      <div id="mo-guests"></div>
    </div>

    <hr class="div">

    <!-- Nouveau profil -->
    <span class="slbl">Nouveau profil</span>
    <div class="fr">
      <label class="lbl" for="id-name">Prénom ou initiales</label>
      <input class="inp" id="id-name" type="text" placeholder="ex: Sophie, FX, Invité..." maxlength="20" autocomplete="off">
    </div>
    <div class="fr">
      <label class="lbl">Couleur</label>
      <div class="swatches" id="mo-colors"></div>
    </div>
    <div class="fa">
      <button class="btn pri" id="mo-confirm">C'est parti !</button>
    </div>
  </div>
</div>

<!-- MODAL AJOUT -->
<div class="ov" id="add-ov" style="display:none">
  <div class="box">
    <h2>Ajouter un morceau</h2>
    <p class="sub" id="add-hint"></p>
    <div class="fg">
      <div class="fr"><label class="lbl">Titre *</label><input class="inp" id="f-title" type="text" placeholder="ex: Starboy" autocomplete="off"></div>
      <div class="fr"><label class="lbl">Artiste *</label><input class="inp" id="f-artist" type="text" placeholder="ex: The Weeknd" autocomplete="off"></div>
    </div>
    <div class="fg">
      <div class="fr"><label class="lbl">Durée</label><input class="inp" id="f-dur" type="text" placeholder="ex: 3:50" maxlength="8"></div>
      <div class="fr"><label class="lbl">Setlist</label><select class="sel" id="f-set"></select></div>
    </div>
    <div class="fg">
      <div class="fr"><label class="lbl">Style</label>
        <select class="sel" id="f-style">
          <option value="pop">Pop</option><option value="rock">Rock / New Wave</option>
          <option value="rnb">R&B / Soul / Funk</option><option value="electro">Électro / Dance</option>
          <option value="disco">Disco / Funk vintage</option><option value="hiphop">Hip-hop / Rap</option>
          <option value="variete">Variété FR</option><option value="latin">Latin / Reggaeton</option>
          <option value="medley">Medley</option>
        </select>
      </div>
      <div class="fr"><label class="lbl">Note</label><input class="inp" id="f-note" type="text" placeholder="Optionnel..." autocomplete="off"></div>
    </div>
    <p class="err" id="f-err">Titre et artiste sont obligatoires</p>
    <div class="fa">
      <button class="btn" onclick="closeAdd()">Annuler</button>
      <button class="btn pri" onclick="submitTrack()">Ajouter</button>
    </div>
  </div>
</div>

<!-- MODAL PARTITION -->
<div class="ov" id="part-ov" style="display:none">
  <div class="box wide">
    <h2 id="pt-title"></h2>
    <p class="sub" id="pt-artist"></p>
    <div id="pt-lyrics-wrap"></div>
    <div class="pblock"><label>🎸 Guitare</label><textarea class="ta" id="pa-guitar" placeholder="Accords guitare, tonalité, capo..."></textarea></div>
    <div class="pblock"><label>🎸 Basse</label><textarea class="ta" id="pa-bass" placeholder="Accords basse, root notes, groove..."></textarea></div>
    <div class="pblock"><label>🎹 Clavier</label><textarea class="ta" id="pa-keys" placeholder="Accords clavier, voicings, nappes..."></textarea></div>
    <div class="pblock"><label>🥁 Batterie</label><textarea class="ta" id="pa-drums" placeholder="Structure, tempo, groove..."></textarea></div>
    <div class="pblock"><label>📝 Notes libres</label><textarea class="ta" id="pa-notes" placeholder="Arrangements, idées..."></textarea></div>
    <div class="save-row">
      <button class="btn pri" style="flex:none;padding:10px 22px" onclick="savePart()">Sauvegarder</button>
      <span id="pt-status"></span>
      <span class="upd" id="pt-upd"></span>
      <button class="btn" style="margin-left:auto" onclick="closePart()">Fermer</button>
    </div>
  </div>
</div>

<!-- PAGE -->
<header>
  <div><h1>Setlists</h1><p>La Sauce 🎵</p></div>
  <div class="stats" id="stats"></div>
</header>

<div class="idbar" id="idbar" style="display:none">
  <div class="idbadge" id="idbadge"></div>
  <span class="chg" onclick="openMo()">changer</span>
  <div class="sync" id="sync"></div>
  <button class="add-btn" onclick="openAdd()">+ Ajouter un titre</button>
</div>

<div class="tabs" id="tabs"></div>
<div class="filters" id="filters"></div>
<main id="main"></main>

<footer>
  <p>✕ Vote pour exclure · 4 votes = retiré · 📄 Partition/accords · ✦ ajouté par le groupe</p>
  <div class="legend" id="legend"></div>
</footer>

const CORE = [

  {name:'Mat',  initials:'MT', color:'#1D9E75', set:'mat'},
  {name:'Rose', initials:'R',  color:'#E24B4A', set:'rose'},
];

const STYLES = {
  medley: {label:'Medley',          color:'#534AB7', bg:'#EEEDFE', tc:'#26215C'},
  electro:{label:'Électro / Dance', color:'#7F77DD', bg:'#EEEDFE', tc:'#3C3489'},
  disco:  {label:'Disco / Funk',    color:'#888780', bg:'#F1EFE8', tc:'#444441'},
  pop:    {label:'Pop',             color:'#D4537E', bg:'#FBEAF0', tc:'#72243E'},
  rnb:    {label:'R&B / Soul',      color:'#1D9E75', bg:'#E1F5EE', tc:'#085041'},

// ── HELPERS ─────────────────────────────────────────────────
function pd(d){ const m=d.match(/^(\d+):(\d+)/); return m ? +m[1]*60 + +m[2] : 300; }
function fs(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?h+'h'+String(m).padStart(2,'0'):m+'min'+String(s%60).padStart(2,'0'); }
function fl(s){ const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h?h+'h '+m+'min':m+' min'; }
function fbk(n){ return n.replace(/[.#$\/\[\]]/g,'_'); }
function setKeyFor(n){ const c=CORE.find(c=>c.name===n); return c?c.set:n.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,12)||'invite'; }
function setLabel(k){ const c=CORE.find(c=>c.set===k); return c?'Côté '+c.name:'Côté '+k.charAt(0).toUpperCase()+k.slice(1); }

let fbVotes={}, fbCustom={}, fbMembers={}, fbParts={};
let me = null;          // {name, initials, color, set}
let curTab = 'all';
let curStyle = 'all';
let showExcl = false;
let curPartId = null;

function allTracks(){ return [...BASE, ...Object.values(fbCustom)]; }
function isExcl(tr){ return Object.keys(fbVotes[tr.id]||{}).length >= 4; }
function getVoters(id){ return Object.keys(fbVotes[id]||{}); }

function allMembers(){
  const list = CORE.map(c => ({...c}));
  Object.values(fbMembers).forEach(m => {
    if(!list.find(x => x.name===m.name)) list.push(m);
  });
  return list;
}

function getAllSets(){
  const sets = {};
  CORE.forEach(c => { sets[c.set] = 'Côté '+c.name; });
  allTracks().concat(Object.values(fbMembers)).forEach(item => {
    if(item.set && !sets[item.set]) sets[item.set] = setLabel(item.set);
  });
  return sets;
}

// ── STORAGE ──────────────────────────────────────────────────
function loadMe(){ try{ return JSON.parse(localStorage.getItem('sl_me')||'null'); }catch(e){ return null; } }
function saveMe(m){ localStorage.setItem('sl_me', JSON.stringify(m)); }

// ── IDENTITY MODAL ───────────────────────────────────────────
function openMo(){
  // Reset color picker
  pickedColor = PALETTE[0];
  renderSwatches();
  // Clear name input
  document.getElementById('id-name').value = '';
  document.getElementById('id-name').style.borderColor = '';
  // Render admin buttons
  renderAdmins();
  // Render guests
  renderGuests();
  document.getElementById('mo-ov').style.display = 'flex';
}
window.openMo = openMo;

function renderAdmins(){
  const el = document.getElementById('mo-admins');
  el.innerHTML = '';
  CORE.forEach(c => {
    // Use Firebase data if available (in case someone updated their color)
    const fbData = Object.values(fbMembers).find(m=>m.name===c.name);
    const m = fbData || c;
    const btn = document.createElement('button');
    btn.className = 'mbtn';
    btn.innerHTML = '<div class="mav" style="background:'+m.color+'">'+m.initials+'</div>'+m.name;
    btn.addEventListener('click', () => { applyMe({...m}); });
    el.appendChild(btn);
  });
}

function renderGuests(){
  const guests = Object.values(fbMembers).filter(m => !CORE.find(c=>c.name===m.name));
  const wrap = document.getElementById('mo-guests-wrap');
  const el   = document.getElementById('mo-guests');
  if(!guests.length){ wrap.style.display='none'; return; }
  wrap.style.display = 'block';
  el.innerHTML = '';
  const isAdmin = me && CORE.find(c=>c.name===me.name);
  guests.forEach(m => {
    const row = document.createElement('div');
    row.className = 'guest-row';
    // Login button
    const btn = document.createElement('button');
    btn.className = 'mbtn';
    btn.innerHTML = '<div class="mav" style="background:'+m.color+'">'+m.initials+'</div>'+m.name;
    btn.addEventListener('click', () => { applyMe({...m}); });
    row.appendChild(btn);
    // Delete button (admins only)
    if(isAdmin){
      const del = document.createElement('button');
      del.className = 'del-red';
      del.textContent = '🗑️ Supprimer le côté';
      del.addEventListener('click', async () => {
        const gset = m.set || setKeyFor(m.name);
        if(!confirm('Supprimer le côté de "'+m.name+'" et tous ses titres ajoutés ?')) return;
        await remove(ref(db, 'members/'+fbk(m.name)));
        const toKill = Object.entries(fbCustom).filter(([,tr])=>tr.set===gset);
        await Promise.all(toKill.map(([id])=>remove(ref(db,'custom/'+id))));
        renderGuests();
      });
      row.appendChild(del);
    }
    el.appendChild(row);
  });
  if(isAdmin){
    const note = document.createElement('p');
    note.style.cssText = 'font-size:11px;color:var(--faint);margin-top:4px';
    note.textContent = 'Supprimer le côté = supprimer l\'invité et tous ses titres';
    el.appendChild(note);
  }
}

function renderSwatches(){
  const el = document.getElementById('mo-colors');
  el.innerHTML = '';
  PALETTE.forEach(col => {
    const sw = document.createElement('div');
    sw.className = 'sw' + (col===pickedColor?' on':'');
    sw.style.background = col;
    sw.addEventListener('click', () => {
      pickedColor = col;
      el.querySelectorAll('.sw').forEach(s => s.classList.toggle('on', s.style.background===col));
    });
    el.appendChild(sw);
  });
}

function applyMe(m){
  if(!m.set) m.set = setKeyFor(m.name);
  me = m;
  saveMe(m);
  // Save guest to Firebase
  if(!CORE.find(c=>c.name===m.name)){
    set(ref(db,'members/'+fbk(m.name)), m);
  }
  document.getElementById('mo-ov').style.display = 'none';
  // Update id bar
  document.getElementById('idbar').style.display = 'flex';
  document.getElementById('idbadge').innerHTML =
    '<div class="av" style="background:'+m.color+'">'+m.initials+'</div>'+m.name;
  rebuild();
}

document.getElementById('mo-confirm').addEventListener('click', () => {
  const name = document.getElementById('id-name').value.trim();
  if(!name){
    document.getElementById('id-name').style.borderColor = '#E24B4A';
    return;
  }
  const initials = name.length <= 3 ? name.toUpperCase() : name.slice(0,2).toUpperCase();
  applyMe({ name, initials, color: pickedColor, set: setKeyFor(name) });
});

// Close modals on overlay click
document.getElementById('mo-ov').addEventListener('click', e => {
  if(e.target === document.getElementById('mo-ov')) document.getElementById('mo-ov').style.display = 'none';
});

  const userSet = me.set || setKeyFor(me.name);
  const allSets = getAllSets();
  // Populate setlist select
  const sel = document.getElementById('f-set');
  sel.innerHTML = '';
  Object.entries(allSets).forEach(([k,v]) => {
    const opt = document.createElement('option');
    opt.value = k; opt.textContent = v;
    if(k===userSet) opt.selected = true;
    sel.appendChild(opt);
  });
  document.getElementById('add-hint').textContent = '→ Sera ajouté dans "'+allSets[userSet]+'"';
  document.getElementById('f-err').style.display = 'none';
  document.getElementById('f-title').value = '';
  document.getElementById('f-artist').value = '';
  document.getElementById('f-dur').value = '';
  document.getElementById('f-note').value = '';
  document.getElementById('add-ov').style.display = 'flex';
  setTimeout(() => document.getElementById('f-title').focus(), 100);
};

window.closeAdd = function(){ document.getElementById('add-ov').style.display = 'none'; };

document.getElementById('add-ov').addEventListener('click', e => {
  if(e.target === document.getElementById('add-ov')) closeAdd();
});

window.submitTrack = async function(){
  const t = document.getElementById('f-title').value.trim();
  const a = document.getElementById('f-artist').value.trim();
  if(!t||!a){ document.getElementById('f-err').style.display='block'; return; }
  document.getElementById('f-err').style.display = 'none';
  const id = 'custom_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  await set(ref(db,'custom/'+id), {
    id, t, a,
    d: document.getElementById('f-dur').value.trim()||'?:??',
    s: document.getElementById('f-style').value,
    set: document.getElementById('f-set').value,
    n: document.getElementById('f-note').value.trim()||null,
    custom:true, addedBy:me.name, addedColor:me.color, addedInitials:me.initials,
    addedAt: Date.now()
  });
  closeAdd();
  curTab = 'new';
  rebuild();
};

// ── PARTITION ────────────────────────────────────────────────
async function openPart(tr){
  curPartId = tr.id;
  document.getElementById('pt-title').textContent  = tr.t;
  document.getElementById('pt-artist').textContent = tr.a;
  // Lyrics
  const lw = document.getElementById('pt-lyrics-wrap');
  const url = LYRICS[tr.t];
  if(url){
    lw.innerHTML = '<a class="part-link" href="'+url+'" target="_blank" rel="noopener">📖 Voir les paroles →</a>';
  } else {
    const saved = (fbParts[tr.id]||{}).lyrics||'';
    lw.innerHTML = '<div class="pblock"><label>📖 Paroles</label><textarea class="ta" id="pa-lyrics" placeholder="Colle les paroles ici..." style="min-height:100px">'+saved+'</textarea></div>';
  }
  // Chords
  const d = fbParts[tr.id]||{};
  document.getElementById('pa-guitar').value = d.guitar||'';
  document.getElementById('pa-bass').value   = d.bass||'';
  document.getElementById('pa-keys').value   = d.keys||'';
  document.getElementById('pa-drums').value  = d.drums||'';
  document.getElementById('pa-notes').value  = d.notes||'';
  document.getElementById('pt-status').textContent = '';
  document.getElementById('pt-status').className   = '';
  document.getElementById('pt-upd').textContent = d.updatedBy ? 'Modifié par '+d.updatedBy : '';
  document.getElementById('part-ov').style.display = 'flex';
}

window.closePart = function(){ document.getElementById('part-ov').style.display='none'; curPartId=null; };

document.getElementById('part-ov').addEventListener('click', e => {
  if(e.target === document.getElementById('part-ov')) closePart();
});

window.savePart = async function(){
  if(!curPartId) return;
  const lyrEl = document.getElementById('pa-lyrics');
  const data = {
    guitar: document.getElementById('pa-guitar').value.trim()||null,
    bass:   document.getElementById('pa-bass').value.trim()||null,
    keys:   document.getElementById('pa-keys').value.trim()||null,
    drums:  document.getElementById('pa-drums').value.trim()||null,
    notes:  document.getElementById('pa-notes').value.trim()||null,
    lyrics: lyrEl ? lyrEl.value.trim()||null : null,
    updatedBy: me?me.name:'?', updatedAt: Date.now()
  };
  const st = document.getElementById('pt-status');
  try{
    await set(ref(db,'partitions/'+curPartId), data);
    st.textContent='✓ Sauvegardé !'; st.className='sav-ok';
    document.getElementById('pt-upd').textContent = 'Modifié par '+(me?me.name:'?');
    setTimeout(()=>{ st.textContent=''; st.className=''; }, 2500);
  }catch(e){ st.textContent='Erreur'; st.className='sav-err'; }
};

// ── VOTE ─────────────────────────────────────────────────────
async function toggleVote(id){
  if(!me){ openMo(); return; }
  await runTransaction(ref(db,'votes/'+id+'/'+fbk(me.name)), cur => cur?null:true);
}
async function delCustom(id){
  if(!confirm('Supprimer ce titre ?')) return;
  await remove(ref(db,'custom/'+id));
}

// ── RENDER ───────────────────────────────────────────────────
function mkVoteRow(tr){
  const vl = getVoters(tr.id);
  const myK = me ? fbk(me.name) : null;
  const voted = myK && vl.includes(myK);
  const members = allMembers();
  const allKeys = [...new Set([...members.map(m=>fbk(m.name)), ...vl])];
  const pips = allKeys.map(k=>{
    const m = members.find(x=>fbk(x.name)===k);
    const on = vl.includes(k);
    const ini = m?m.initials:k.slice(0,2).toUpperCase();
    const col = m?m.color:'#888';
    return '<span class="pip'+(on?' on':'')+'"'+(on?' style="background:'+col+';border-color:'+col+'"':'')+' title="'+(m?m.name:k)+'">'+ini+'</span>';
  }).join('');
  const hasData = fbParts[tr.id] && Object.values(fbParts[tr.id]).some(v=>v&&typeof v==='string'&&v.length>0);
  const del = tr.custom ? '<button class="delbtn" data-del="'+tr.id+'">✕</button>' : '';
  return '<div class="vrow">'
    +'<button class="pbtn'+(hasData?' has-data':'')+'" data-part="'+tr.id+'" title="Partition / Accords">📄</button>'
    +'<button class="vbtn'+(voted?' voted':'')+'" data-vote="'+tr.id+'">✕</button>'
    +'<div class="pips">'+pips+'</div>'
    +del+'</div>';
}

// ── TABS ─────────────────────────────────────────────────────
function buildTabs(){
  const cc = Object.keys(fbCustom).length;
  const allSets = getAllSets();
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  const tabDefs = [
    {id:'all', label:'Toutes'},
    ...Object.entries(allSets).map(([k,v])=>({id:k,label:v})),
    {id:'new', label:'✦ Nouveautés', badge:cc},
  ];
  tabDefs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab'+(curTab===t.id?' on':'');
    btn.textContent = t.label;
    if(t.badge>0){
      const span = document.createElement('span');
      span.className = 'badge';
      span.textContent = t.badge;
      btn.appendChild(span);
    }
    btn.addEventListener('click', ()=>{ curTab=t.id; rebuild(); });
    el.appendChild(btn);
  });
}

// ── FILTERS ──────────────────────────────────────────────────
function buildFilters(){
  const el = document.getElementById('filters');
  if(curTab==='new'){ el.innerHTML=''; return; }
  const ec = allTracks().filter(isExcl).length;
  el.innerHTML = '';
  // Style filters
  [{id:'all',label:'Tous les styles'}, ...Object.entries(STYLES).map(([id,s])=>({id,label:s.label}))].forEach(f=>{
    const btn = document.createElement('button');
    btn.className = 'fb'+(curStyle===f.id?' on':'');
    btn.textContent = f.label;
    btn.addEventListener('click', ()=>{ curStyle=f.id; rebuild(); });
    el.appendChild(btn);
  });
  const sep = document.createElement('div'); sep.className='sep'; el.appendChild(sep);
  // Excl filter
  const excl = document.createElement('button');
  excl.className = 'fb excl-btn'+(showExcl?' on':'');
  excl.textContent = '🗑️ Exclus'+(ec>0?' ('+ec+')':'');
  excl.addEventListener('click', ()=>{ showExcl=!showExcl; rebuild(); });
  el.appendChild(excl);
}

// ── STATS ─────────────────────────────────────────────────────
function buildStats(){
  const el = document.getElementById('stats');
  if(curTab==='new'){
    const cc = Object.keys(fbCustom).length;
    el.innerHTML = [
      {n:cc,l:'ajoutés'},
      {n:[...new Set(Object.values(fbCustom).map(t=>t.set))].length||0,l:'setlists'},
      {n:'—',l:'durée'},
    ].map(s=>'<div class="stat"><div class="stat-n">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>').join('');
    return;
  }
  const sf = curTab==='all' ? null : curTab;
  const f = allTracks().filter(tr=>
    (!sf||tr.set===sf) &&
    (curStyle==='all'||tr.s===curStyle) &&
    (!showExcl||!isExcl(tr))
  );
  const total = f.filter(tr=>!isExcl(tr)).reduce((a,tr)=>a+pd(tr.d),0);
  el.innerHTML = [
    {n:f.length,l:'morceaux'},
    {n:[...new Set(f.map(tr=>tr.set))].length,l:'setlists'},
    {n:fl(total),l:'durée totale'},
  ].map(s=>'<div class="stat"><div class="stat-n">'+s.n+'</div><div class="stat-l">'+s.l+'</div></div>').join('');
}

// ── NEW VIEW ─────────────────────────────────────────────────
function buildNew(){
  const main = document.getElementById('main');
  main.innerHTML = '';
  const custom = Object.values(fbCustom).sort((a,b)=>(b.addedAt||0)-(a.addedAt||0));
  if(!custom.length){
    main.innerHTML = '<div class="empty">Aucun titre ajouté pour l\'instant.<br>Soyez le premier !</div>';
    return;
  }
  const allSets = getAllSets();
  custom.forEach(tr => {
    const sty = STYLES[tr.s]||STYLES.pop;
    const card = document.createElement('div');
    card.className = 'ncard';
    const when = tr.addedAt ? ' · '+new Date(tr.addedAt).toLocaleDateString('fr-FR',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    const canDel = me && me.name===tr.addedBy;
    card.innerHTML =
      '<div class="ncard-head">'
        +'<div style="width:32px;height:32px;border-radius:50%;background:'+(tr.addedColor||'#1D9E75')+';display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0">'+(tr.addedInitials||'?')+'</div>'
        +'<div><div class="ncard-title">'+tr.t+'</div><div class="ncard-artist">'+tr.a+'</div></div>'
        +'<span class="pill" style="margin-left:auto;background:'+sty.bg+';color:'+sty.tc+'">'+sty.label+'</span>'
      +'</div>'
      +'<div class="ncard-meta">'
        +'<span class="pill" style="background:var(--cream);color:var(--muted);border:1px solid var(--border)">'+(allSets[tr.set]||tr.set)+'</span>'
        +'<span style="font-size:12px;color:var(--muted)">'+tr.d+'</span>'
        +(tr.n?'<span style="font-size:11px;color:var(--faint);font-style:italic">'+tr.n+'</span>':'')
      +'</div>'
      +'<div class="ncard-by">Ajouté par '+(tr.addedBy||'?')+when+'</div>'
      +'<div class="ncard-actions">'
        +'<button class="btn sm" data-part="'+tr.id+'">📄 Partition</button>'
        +(canDel?'<button class="btn sm danger" data-del="'+tr.id+'">Supprimer</button>':'')
      +'</div>';
    main.appendChild(card);
  });
  // Events
  main.querySelectorAll('[data-part]').forEach(b=>b.addEventListener('click',()=>{
    const tr=allTracks().find(t=>t.id===b.dataset.part);
    if(tr) openPart(tr);
  }));
  main.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delCustom(b.dataset.del)));
}

// ── SETLIST VIEW ─────────────────────────────────────────────
function buildSetlists(){
  const allSets = getAllSets();
  const sf = curTab==='all' ? null : curTab;
  const f = allTracks().filter(tr=>
    (!sf||tr.set===sf) &&
    (curStyle==='all'||tr.s===curStyle) &&
    (!showExcl||!isExcl(tr))
  );
  const main = document.getElementById('main');
  main.innerHTML = '';
  const styleOrder = ['medley','electro','disco','pop','rnb','rock','hiphop','variete','latin'];
  const show = sf ? [sf] : Object.keys(allSets);

  show.forEach(setK => {
    const st = f.filter(tr=>tr.set===setK);
    if(!st.length) return;
    const total = st.filter(tr=>!isExcl(tr)).reduce((a,tr)=>a+pd(tr.d),0);
    const blk = document.createElement('div');
    blk.className = 'sblock';
    blk.innerHTML = '<div class="shead">'
      +'<span class="sname">'+(allSets[setK]||setLabel(setK))+'</span>'
      +'<span class="smeta">'+st.length+' titre'+(st.length>1?'s':'')+'</span>'
      +'<span class="stotal">Durée : '+fl(total)+'</span>'
      +'</div>';

    styleOrder.forEach(sk => {
      const gt = st.filter(tr=>tr.s===sk);
      if(!gt.length) return;
      const sty = STYLES[sk];
      const gsec = gt.filter(tr=>!isExcl(tr)).reduce((a,tr)=>a+pd(tr.d),0);
      const grp = document.createElement('div');
      grp.className = 'sgrp';
      grp.innerHTML = '<div class="sgrp-lbl">'
        +'<div class="sgrp-dot" style="background:'+sty.color+'"></div>'
        +'<span class="sgrp-name">'+sty.label+'</span>'
        +'<span class="sgrp-dur">'+gt.length+' titre'+(gt.length>1?'s':'')+' · '+fs(gsec)+'</span>'
        +'</div>';

      const td = document.createElement('div');
      td.className = 'tracks';
      gt.forEach((tr,i) => {
        const excl = isExcl(tr);
        const el = document.createElement('div');
        el.className = 'track'+(tr.s==='medley'?' is-med':'')+(excl?' is-excl':'')+(tr.custom?' is-new':'');
        const prefix = tr.s==='medley'
          ? '<span class="mtag">Medley</span>'
          : tr.custom
            ? '<span class="ntag" style="background:'+(tr.addedColor||'#1D9E75')+'25;color:'+(tr.addedColor||'#085041')+'">✦ '+(tr.addedBy||'?')+'</span>'
            : '';
        el.innerHTML = '<div class="trow">'
          +'<span class="tnum">'+(i+1)+'</span>'
          +'<div class="tinfo">'
            +'<div class="tt">'+prefix+' '+tr.t+'</div>'
            +'<div class="ta2">'+tr.a+'</div>'
            +(tr.n?'<div class="tnote">'+tr.n+'</div>':'')
          +'</div>'
          +'<span class="tdur">'+tr.d+'</span>'
          +'<span class="pill" style="background:'+sty.bg+';color:'+sty.tc+'">'+sty.label+'</span>'
          +mkVoteRow(tr)
          +'</div>';
        td.appendChild(el);
      });
      grp.appendChild(td);
      blk.appendChild(grp);
    });
    main.appendChild(blk);
  });

  // Wire up events
  main.querySelectorAll('[data-vote]').forEach(b=>b.addEventListener('click',()=>toggleVote(b.dataset.vote)));
  main.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>delCustom(b.dataset.del)));
  main.querySelectorAll('[data-part]').forEach(b=>b.addEventListener('click',()=>{
    const tr=allTracks().find(t=>t.id===b.dataset.part);
    if(tr) openPart(tr);
  }));
}

// ── REBUILD ───────────────────────────────────────────────────
function rebuild(){
  buildTabs();
  buildFilters();
  buildStats();
  if(curTab==='new') buildNew(); else buildSetlists();
}

// ── FIREBASE LISTENERS ────────────────────────────────────────
const syncEl = document.getElementById('sync');
onValue(ref(db,'votes'),      snap=>{ fbVotes   = snap.val()||{}; syncEl.className='sync ok'; rebuild(); }, ()=>{ syncEl.className='sync err'; });
onValue(ref(db,'custom'),     snap=>{ fbCustom  = snap.val()||{}; rebuild(); });
onValue(ref(db,'members'),    snap=>{ fbMembers = snap.val()||{}; rebuild(); });
onValue(ref(db,'partitions'), snap=>{ fbParts   = snap.val()||{}; rebuild(); });

// ── ESC ───────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if(e.key!=='Escape') return;
  document.getElementById('mo-ov').style.display   = 'none';
  document.getElementById('add-ov').style.display  = 'none';
  document.getElementById('part-ov').style.display = 'none';
});

// ── LEGEND ───────────────────────────────────────────────────
document.getElementById('legend').innerHTML = Object.entries(STYLES).map(([,s])=>
  '<div class="leg"><div class="leg-dot" style="background:'+s.color+'"></div>'+s.label+'</div>'
).join('');

// ── INIT ─────────────────────────────────────────────────────
me = loadMe();
if(me){
  document.getElementById('idbar').style.display = 'flex';
  document.getElementById('idbadge').innerHTML =
    '<div class="av" style="background:'+me.color+'">'+me.initials+'</div>'+me.name;
  rebuild();
} else {
  openMo();
}
setTimeout(()=>{ document.getElementById('loading').style.display='none'; }, 1000);
</script>
