<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setlists — Clem · Max · Mat · Rose</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#FAF7F2;--ink:#1A1714;--ink-muted:#6B6560;--ink-faint:#B8B3AE;--border:#E8E2DA}
body{background:var(--cream);color:var(--ink);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}

#loading{position:fixed;inset:0;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;z-index:9999}
#loading h2{font-family:'DM Serif Display',serif;font-size:1.8rem}
#loading p{font-size:13px;color:var(--ink-muted)}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.modal-overlay{position:fixed;inset:0;background:rgba(26,23,20,.6);display:flex;align-items:center;justify-content:center;z-index:999;padding:1rem}
.modal{background:var(--cream);border-radius:14px;padding:2rem;width:min(380px,100%);border:1.5px solid var(--ink)}
.modal h2{font-family:'DM Serif Display',serif;font-size:1.5rem;margin-bottom:.3rem}
.modal p{font-size:13px;color:var(--ink-muted);margin-bottom:1.2rem}
.voter-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.voter-btn{padding:.75rem 1rem;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.voter-btn:hover{border-color:var(--ink);background:var(--ink);color:var(--cream)}

.add-modal{background:var(--cream);border-radius:14px;padding:2rem;width:min(460px,100%);border:1.5px solid var(--ink);max-height:90vh;overflow-y:auto}
.add-modal h2{font-family:'DM Serif Display',serif;font-size:1.4rem;margin-bottom:1.25rem}
.form-row{margin-bottom:1rem}
.form-row label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-muted);margin-bottom:5px}
.form-row input,.form-row select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;background:white;color:var(--ink);outline:none;transition:border-color .15s;-webkit-appearance:none}
.form-row input:focus,.form-row select:focus{border-color:var(--ink)}
.form-row input::placeholder{color:var(--ink-faint)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-actions{display:flex;gap:10px;margin-top:1.25rem}
.btn-primary{flex:1;padding:10px;border-radius:8px;border:1.5px solid var(--ink);background:var(--ink);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-primary:hover{opacity:.85}
.btn-secondary{padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;color:var(--ink-muted);transition:all .15s}
.btn-secondary:hover{border-color:var(--ink-faint);color:var(--ink)}
.form-error{font-size:12px;color:#A32D2D;margin-top:-.5rem;display:none}

.sync-dot{width:8px;height:8px;border-radius:50%;background:#B8B3AE;flex-shrink:0;transition:background .3s}
.sync-dot.ok{background:#1D9E75}
.sync-dot.err{background:#E24B4A}

.id-bar{max-width:960px;margin:.75rem auto 0;padding:0 2rem;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.id-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;background:var(--ink);color:var(--cream);font-size:12px;font-weight:500}
.id-change{font-size:12px;color:var(--ink-muted);cursor:pointer;text-decoration:underline}
.id-change:hover{color:var(--ink)}
.add-track-btn{margin-left:auto;padding:5px 14px;border-radius:99px;border:1.5px solid var(--ink);background:transparent;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink);transition:all .15s}
.add-track-btn:hover{background:var(--ink);color:var(--cream)}

header{padding:3rem 2rem 2rem;max-width:960px;margin:0 auto;border-bottom:1.5px solid var(--ink);display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.header-left h1{font-family:'DM Serif Display',serif;font-size:clamp(2rem,6vw,3.5rem);line-height:1;letter-spacing:-.02em}
.header-left p{font-size:13px;color:var(--ink-muted);margin-top:.5rem;font-weight:300}
.header-stats{display:flex;gap:1.5rem;flex-wrap:wrap}
.hstat{text-align:right}
.hstat-n{font-family:'DM Serif Display',serif;font-size:1.8rem;line-height:1}
.hstat-l{font-size:11px;color:var(--ink-muted);margin-top:2px;text-transform:uppercase;letter-spacing:.08em}

.filter-bar{max-width:960px;margin:1.5rem auto 0;padding:0 2rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.filter-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.fb{padding:5px 14px;border-radius:99px;border:1px solid var(--border);background:white;font-size:12px;font-weight:500;cursor:pointer;color:var(--ink-muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.fb:hover{border-color:var(--ink-faint);color:var(--ink)}
.fb.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.fb.excl-btn{color:#A32D2D;border-color:#F7C1C1;background:#FCEBEB}
.fb.excl-btn.active{background:#E24B4A;color:white;border-color:#E24B4A}

main{max-width:960px;margin:0 auto;padding:2rem}
.setlist-block{margin-bottom:3rem}
.setlist-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1.5px solid var(--ink);flex-wrap:wrap}
.setlist-name{font-family:'DM Serif Display',serif;font-size:1.5rem;letter-spacing:-.01em}
.setlist-meta{font-size:12px;color:var(--ink-muted);font-weight:300}
.setlist-total{margin-left:auto;font-size:12px;color:var(--ink-muted)}

.style-group{margin-bottom:1.2rem}
.style-label{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.style-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.style-name{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-muted)}
.style-dur{font-size:11px;color:var(--ink-faint);margin-left:auto}

.tracks{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:white}
.track{display:grid;grid-template-columns:24px 1fr auto auto auto;gap:0 10px;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s}
.track:last-child{border-bottom:none}
.track:hover{background:var(--cream)}
.track.is-excl{background:#FCEBEB !important;opacity:.5}
.track.is-excl .track-title{text-decoration:line-through;color:var(--ink-muted)}
.track.is-medley{background:#F7F4EF}
.track.is-medley:hover{background:#F0EDE7}
.track.is-new{border-left:3px solid #1D9E75}
.track-num{font-size:11px;color:var(--ink-faint);text-align:right}
.track-info{min-width:0}
.track-title{font-weight:500;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-artist{font-size:12px;color:var(--ink-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-note{font-size:11px;color:var(--ink-faint);font-style:italic;margin-top:1px}
.track-dur{font-size:12px;color:var(--ink-muted);white-space:nowrap}
.pill{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;white-space:nowrap;letter-spacing:.02em}
.medley-tag{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;background:var(--ink);color:var(--cream);padding:1px 6px;border-radius:3px;margin-right:4px;vertical-align:middle}
.new-tag{display:inline-block;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;background:#E1F5EE;color:#085041;padding:1px 6px;border-radius:3px;margin-right:4px;vertical-align:middle}

.vote-wrap{display:flex;align-items:center;gap:4px}
.vote-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);background:white;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0;flex-shrink:0}
.vote-btn:hover{border-color:#E24B4A;background:#FCEBEB}
.vote-btn.voted{background:#E24B4A;border-color:#A32D2D}
.voter-pips{display:flex;gap:2px}
.vpip{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;border:1px solid #ddd;background:#F1EFE8;color:#aaa;flex-shrink:0;transition:all .2s}
.vpip.on{background:#E24B4A;border-color:#A32D2D;color:white}
.del-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;color:var(--ink-faint);padding:0;flex-shrink:0;margin-left:2px}
.del-btn:hover{border-color:#E24B4A;color:#E24B4A;background:#FCEBEB}

footer{max-width:960px;margin:0 auto;padding:1.5rem 2rem 3rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem}
footer p{font-size:11px;color:var(--ink-faint)}
.legend{display:flex;flex-wrap:wrap;gap:8px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink-muted)}
.leg-dot{width:7px;height:7px;border-radius:50%}

@media(max-width:640px){
  header,.filter-bar,main,footer,.id-bar{padding-left:1.25rem;padding-right:1.25rem}
  .track{grid-template-columns:20px 1fr auto auto}
  .track .pill{display:none}
  .voter-pips{display:none}
  .hstat-n{font-size:1.4rem}
  .header-stats{gap:1rem}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2>Setlists</h2>
  <p>Connexion en cours…</p>
</div>

<div class="modal-overlay" id="mo" style="display:none">
  <div class="modal">
    <h2>Qui es-tu ?</h2>
    <p>Choisis ton nom pour voter et ajouter des morceaux</p>
    <div class="voter-btns">
      <button class="voter-btn" onclick="setVoter('Clem')">🎤 Clem</button>
      <button class="voter-btn" onclick="setVoter('Max')">🎸 Max</button>
      <button class="voter-btn" onclick="setVoter('Mat')">🥁 Mat</button>
      <button class="voter-btn" onclick="setVoter('Rose')">🎹 Rose</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="addMo" style="display:none">
  <div class="add-modal">
    <h2>Ajouter un morceau</h2>
    <div class="form-row">
      <label>Titre</label>
      <input type="text" id="f-title" placeholder="ex: Starboy" autocomplete="off">
    </div>
    <div class="form-row">
      <label>Artiste</label>
      <input type="text" id="f-artist" placeholder="ex: The Weeknd" autocomplete="off">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label>Durée</label>
        <input type="text" id="f-dur" placeholder="ex: 3:50" maxlength="8">
      </div>
      <div class="form-row">
        <label>Setlist</label>
        <select id="f-set">
          <option value="clem">Côté Clem</option>
          <option value="max">Côté Max</option>
          <option value="mat">Côté Mat</option>
          <option value="rose">Côté Rose</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>Style musical</label>
      <select id="f-style">
        <option value="pop">Pop</option>
        <option value="rock">Rock / New Wave</option>
        <option value="rnb">R&B / Soul / Funk</option>
        <option value="electro">Électro / Dance</option>
        <option value="disco">Disco / Funk vintage</option>
        <option value="hiphop">Hip-hop / Rap</option>
        <option value="variete">Variété FR</option>
        <option value="latin">Latin / Reggaeton</option>
        <option value="medley">Medley</option>
      </select>
    </div>
    <div class="form-row">
      <label>Note (optionnel)</label>
      <input type="text" id="f-note" placeholder="ex: Voir avec l'équipe" autocomplete="off">
    </div>
    <p class="form-error" id="form-error">Titre et artiste sont obligatoires</p>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeAdd()">Annuler</button>
      <button class="btn-primary" onclick="submitTrack()">Ajouter</button>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <h1>Setlists</h1>
    <p>Clem &middot; Max &middot; Mat &middot; Rose</p>
  </div>
  <div class="header-stats" id="hstats"></div>
</header>

<div class="id-bar" id="idBar" style="display:none">
  <span class="id-badge" id="idBadge"></span>
  <span class="id-change" onclick="document.getElementById('mo').style.display='flex'">changer</span>
  <div class="sync-dot" id="syncDot" title="Synchronisation Firebase"></div>
  <button class="add-track-btn" onclick="openAdd()">+ Ajouter un titre</button>
</div>

<div class="filter-bar" id="filterBar"></div>
<main id="main"></main>

<footer>
  <p>🗑️ Vote pour exclure · 4 votes = retiré · ✦ = ajouté par le groupe</p>
  <div class="legend" id="legend"></div>
</footer>

  {t:"Makeba",a:"Jain",d:"3:00",s:"pop",set:"mat",n:"À intégrer en medley"},
  {t:"99 Luftballons",a:"Nena",d:"3:54",s:"rock",set:"mat",n:"À intégrer en medley"},
  {t:"Simply the Best",a:"Tina Turner",d:"3:58",s:"rock",set:"mat",n:"À intégrer en medley"},
  {t:"Don't Cha",a:"Pussycat Dolls",d:"3:33",s:"rnb",set:"mat",n:"À intégrer en medley"},
  {t:"When I Grow Up",a:"Pussycat Dolls",d:"3:32",s:"pop",set:"mat",n:"À intégrer en medley"},
  {t:"Hot Stuff",a:"Donna Summer",d:"3:49",s:"disco",set:"rose"},
  {t:"Footloose",a:"Kenny Loggins",d:"3:47",s:"rock",set:"rose"},
  {t:"Money for Nothing",a:"Dire Straits",d:"4:01",s:"rock",set:"rose"},
  {t:"Black Betty",a:"Ram Jam",d:"3:20",s:"rock",set:"rose"},
  {t:"I Love Rock 'n' Roll",a:"Joan Jett & The Blackhearts",d:"2:55",s:"rock",set:"rose"},
  {t:"Un autre monde",a:"Téléphone",d:"4:31",s:"rock",set:"rose"},
  {t:"Medley ABBA",a:"ABBA",d:"~5:00",s:"medley",set:"rose",n:"Titres à définir"},
  {t:"Where's My Husband",a:"RAYE",d:"3:10",s:"pop",set:"rose"},
  {t:"Single Ladies",a:"Beyoncé",d:"3:13",s:"rnb",set:"rose"},
  {t:"Old Town Road",a:"Lil Nas X feat. Billy Ray Cyrus",d:"1:53",s:"hiphop",set:"rose"},
  {t:"Chandelier / Cheap Thrills",a:"Sia",d:"3:36 / 3:30",s:"pop",set:"rose",n:"À choisir entre les deux"},
  {t:"Man! I Feel Like a Woman",a:"Shania Twain",d:"3:32",s:"pop",set:"rose"},
  {t:"Lady Marmalade (+ options)",a:"Christina Aguilera / Laly",d:"4:03",s:"rnb",set:"rose",n:"Voir avec Laly"},
  {t:"Perché ti amo",a:"Ricchi e Poveri",d:"3:55",s:"variete",set:"rose"},
  {t:"Prière Païenne",a:"Céline Dion",d:"4:05",s:"variete",set:"rose"},
  {t:"Le Dernier Jour du Disco",a:"Juliette Armanet",d:"3:28",s:"variete",set:"rose"},
  {t:"Un autre monde",a:"Céline Dion",d:"4:18",s:"variete",set:"rose"},
  {t:"Désenchantée",a:"Mylène Farmer",d:"5:44",s:"variete",set:"rose",n:"Si on doit choisir UN Mylène Farmer"},
  {t:"Que je t'aime",a:"Version Camille",d:"4:30",s:"variete",set:"rose"},
  {t:"Jolie Garçon",a:"Pink Martini",d:"3:28",s:"variete",set:"rose"},
  {t:"Laisse tomber les filles",a:"Version Suzanne",d:"2:40",s:"variete",set:"rose"},
  {t:"Battez-vous",a:"Brigitte",d:"3:50",s:"variete",set:"rose"},
  {t:"La Seine",a:"Vanessa Paradis & M",d:"4:12",s:"variete",set:"rose"},
  {t:"La Groupie du pianiste",a:"Michel Berger",d:"3:20",s:"variete",set:"rose"},
  {t:"Alors on danse",a:"Stromae",d:"3:42",s:"electro",set:"rose"},
];
BASE.forEach((tr,i) => { tr.id='base_'+i; tr.custom=false; });

const pd = d => { const m=d.match(/^(\d+):(\d+)/); return m?+m[1]*60+ +m[2]:300 };
const fs = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60; return h>0?h+'h'+String(m).padStart(2,'0'):m+'min'+String(sc).padStart(2,'0') };
const fl = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return h>0?h+'h '+m+'min':m+' min' };

let fbVotes  = {};
let fbCustom = {};
let me = localStorage.getItem('sl_voter') || null;
let activeSet='all', activeStyle='all', hideExcl=false;

const isEx      = tr => fbVotes[tr.id] ? Object.keys(fbVotes[tr.id]).length >= 4 : false;
const getVoters = id => fbVotes[id] ? Object.keys(fbVotes[id]) : [];
const allTracks = ()  => [...BASE, ...Object.values(fbCustom)];

// ── VOTER ──
window.setVoter = name => {
  me = name; localStorage.setItem('sl_voter', name);
  document.getElementById('mo').style.display = 'none';
  document.getElementById('idBar').style.display = 'flex';
  document.getElementById('idBadge').textContent = VE[name]+' '+name;
  build();
};

// ── ADD TRACK ──
window.openAdd = () => {
  if(!me){ document.getElementById('mo').style.display='flex'; return; }
  document.getElementById('addMo').style.display = 'flex';
  setTimeout(()=>document.getElementById('f-title').focus(),100);
};
window.closeAdd = () => {
  document.getElementById('addMo').style.display = 'none';
  document.getElementById('form-error').style.display = 'none';
  ['f-title','f-artist','f-dur','f-note'].forEach(id=>document.getElementById(id).value='');
};
window.submitTrack = async () => {
  const title  = document.getElementById('f-title').value.trim();
  const artist = document.getElementById('f-artist').value.trim();
  if(!title||!artist){ document.getElementById('form-error').style.display='block'; return; }
  document.getElementById('form-error').style.display = 'none';
  const id = 'custom_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  const tr = {
    id, t:title, a:artist,
    d: document.getElementById('f-dur').value.trim()||'?:??',
    s: document.getElementById('f-style').value,
    set: document.getElementById('f-set').value,
    n: document.getElementById('f-note').value.trim()||null,
    custom:true, addedBy:me
  };
  await set(ref(db,'custom/'+id), tr);
  closeAdd();
};

document.getElementById('addMo').addEventListener('click', e=>{ if(e.target===document.getElementById('addMo')) closeAdd(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeAdd(); });

// ── VOTE ──
async function toggleVote(trackId) {
  if(!me){ document.getElementById('mo').style.display='flex'; return; }
  await runTransaction(ref(db,`votes/${trackId}/${me}`), cur => cur ? null : true);
}
async function delCustom(id) {
  if(!confirm('Supprimer ce titre ?')) return;
  await remove(ref(db,'custom/'+id));
}

// ── RENDER ──
function mkVote(tr) {
  const voters = getVoters(tr.id), myV = me&&voters.includes(me);
  const pips = VOTERS.map(v=>`<span class="vpip${voters.includes(v)?' on':''}" title="${v}">${VE[v]}</span>`).join('');
  const del = tr.custom?`<button class="del-btn" data-del="${tr.id}">✕</button>`:'';
  return `<div class="vote-wrap"><button class="vote-btn${myV?' voted':''}" data-vote="${tr.id}">🗑️</button><div class="voter-pips">${pips}</div>${del}</div>`;
}

function buildFilters() {
  const bar = document.getElementById('filterBar');
  const sets = [{id:'all',label:'Toutes'},{id:'clem',label:'Côté Clem'},{id:'max',label:'Côté Max'},{id:'mat',label:'Côté Mat'},{id:'rose',label:'Côté Rose'}];
  const styles = [{id:'all',label:'Tous les styles'},...Object.entries(STYLES).map(([id,s])=>({id,label:s.label}))];
  const ec = allTracks().filter(isEx).length;
  const cc = Object.keys(fbCustom).length;
  bar.innerHTML = [
    ...sets.map(f=>`<button class="fb${activeSet===f.id?' active':''}" data-set="${f.id}">${f.label}</button>`),
    '<div class="filter-sep"></div>',
    ...styles.map(f=>`<button class="fb${activeStyle===f.id?' active':''}" data-style="${f.id}">${f.label}</button>`),
    '<div class="filter-sep"></div>',
    `<button class="fb excl-btn${hideExcl?' active':''}" data-excl>🗑️ Exclus${ec>0?' ('+ec+')':''}</button>`,
    cc>0?`<button class="fb" style="border-color:#9FE1CB;color:#085041;background:#E1F5EE" data-new>✦ Ajoutés (${cc})</button>`:'',
  ].join('');
  bar.querySelectorAll('[data-set]').forEach(b=>b.addEventListener('click',()=>{activeSet=b.dataset.set;build()}));
  bar.querySelectorAll('[data-style]').forEach(b=>b.addEventListener('click',()=>{activeStyle=b.dataset.style;build()}));
  bar.querySelectorAll('[data-excl]').forEach(b=>b.addEventListener('click',()=>{hideExcl=!hideExcl;build()}));
  bar.querySelectorAll('[data-new]').forEach(b=>b.addEventListener('click',()=>{activeStyle='all';activeSet='all';hideExcl=false;build()}));
}

function buildStats() {
  const f = allTracks().filter(tr=>(activeSet==='all'||tr.set===activeSet)&&(activeStyle==='all'||tr.s===activeStyle)&&(!hideExcl||!isEx(tr)));
  const total = f.filter(tr=>!isEx(tr)).reduce((a,tr)=>a+pd(tr.d),0);
  document.getElementById('hstats').innerHTML = [
    {n:f.length,l:'morceaux'},{n:[...new Set(f.map(tr=>tr.set))].length,l:'setlists'},{n:fl(total),l:'durée totale'},
  ].map(s=>`<div class="hstat"><div class="hstat-n">${s.n}</div><div class="hstat-l">${s.l}</div></div>`).join('');
}

function buildMain() {
  const f = allTracks().filter(tr=>(activeSet==='all'||tr.set===activeSet)&&(activeStyle==='all'||tr.s===activeStyle)&&(!hideExcl||!isEx(tr)));
  const main = document.getElementById('main');
  main.innerHTML = '';
  const so = ['medley','electro','disco','pop','rnb','rock','hiphop','variete','latin'];
  const show = activeSet==='all'?['clem','max','mat','rose']:[activeSet];
  show.forEach(setKey => {
    const st = f.filter(tr=>tr.set===setKey);
    if(!st.length) return;
    const total = st.filter(tr=>!isEx(tr)).reduce((a,tr)=>a+pd(tr.d),0);
    const blk = document.createElement('div');
    blk.className = 'setlist-block';
    blk.innerHTML = `<div class="setlist-header"><span class="setlist-name">${SETS[setKey].name}</span><span class="setlist-meta">${st.length} titre${st.length>1?'s':''}</span><span class="setlist-total">Durée : ${fl(total)}</span></div>`;
    so.forEach(sk => {
      const gt = st.filter(tr=>tr.s===sk);
      if(!gt.length) return;
      const gsecs = gt.filter(tr=>!isEx(tr)).reduce((a,tr)=>a+pd(tr.d),0);
      const sty = STYLES[sk];
      const grp = document.createElement('div');
      grp.className = 'style-group';
      grp.innerHTML = `<div class="style-label"><div class="style-dot" style="background:${sty.color}"></div><span class="style-name">${sty.label}</span><span class="style-dur">${gt.length} titre${gt.length>1?'s':''} · ${fs(gsecs)}</span></div>`;
      const td = document.createElement('div');
      td.className = 'tracks';
      gt.forEach((tr,i) => {
        const excl = isEx(tr);
        const row  = document.createElement('div');
        row.className = 'track'+(tr.s==='medley'?' is-medley':'')+(excl?' is-excl':'')+(tr.custom?' is-new':'');
        const prefix = tr.s==='medley'?'<span class="medley-tag">Medley</span>':tr.custom?`<span class="new-tag">✦ ${tr.addedBy||'?'}</span>`:'';
        row.innerHTML = `<span class="track-num">${i+1}</span><div class="track-info"><div class="track-title">${prefix} ${tr.t}</div><div class="track-artist">${tr.a}</div>${tr.n?`<div class="track-note">${tr.n}</div>`:''}</div><span class="track-dur">${tr.d}</span><span class="pill" style="background:${sty.bg};color:${sty.tc}">${sty.label}</span>${mkVote(tr)}`;
        td.appendChild(row);
      });
      grp.appendChild(td);
      blk.appendChild(grp);
    });
    main.appendChild(blk);
  });
  main.querySelectorAll('[data-vote]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();toggleVote(b.dataset.vote)}));
  main.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();delCustom(b.dataset.del)}));
}

function build() { buildFilters(); buildStats(); buildMain(); }

// ── INIT ──
const syncDot = document.getElementById('syncDot');

onValue(ref(db,'votes'), snap => {
  fbVotes = snap.val()||{};
  syncDot.className = 'sync-dot ok';
  build();
}, () => { syncDot.className = 'sync-dot err'; });

onValue(ref(db,'custom'), snap => {
  fbCustom = snap.val()||{};
  build();
});

document.getElementById('legend').innerHTML = Object.entries(STYLES)
  .map(([,s])=>`<div class="leg-item"><div class="leg-dot" style="background:${s.color}"></div>${s.label}</div>`).join('');

if(me) {
  document.getElementById('idBar').style.display = 'flex';
  document.getElementById('idBadge').textContent = VE[me]+' '+me;
} else {
  document.getElementById('mo').style.display = 'flex';
}

setTimeout(() => document.getElementById('loading').style.display='none', 1500);
</script>
</body>
</html>
